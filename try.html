<!DOCTYPE html>
<html>
<head>
<style>
/* Add a star before each list item */
li::before {
    content: "★ ";
    color: gold;
}

/* Add a dash after each list item */
li::after {
    content: " _";
    color: gray;
}
</style>
</head>
<body>

<ul>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
</ul>

</body>
</html>
